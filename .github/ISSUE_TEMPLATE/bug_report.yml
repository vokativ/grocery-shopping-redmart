name: Bug report
description: Report a reproducible setup, matching, validation, or cart-preparation problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include addresses, payment details, cookies, order numbers, or unsanitized screenshots."
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, agent, browser, and Node.js version.
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Workflow stage
      options:
        - Dry run
        - Catalog seeding/review
        - Product availability
        - Cart update
        - Cart verification
        - Documentation or setup
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest sanitized sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed account, address, payment, cookie, and order information.
          required: true
